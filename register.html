<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | PARIVESH 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-12 px-4">

    <div class="flex flex-col items-center mb-8">
        <div class="bg-blue-600 text-white font-bold px-4 py-3 rounded-xl text-2xl mb-4 shadow-lg shadow-blue-200">P3</div>
        <h2 class="text-3xl font-bold text-gray-900">PARIVESH 3.0</h2>
        <p class="text-gray-500">Create your account</p>
    </div>

    <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 md:p-10">
        <h3 class="text-2xl font-bold text-gray-900 mb-1">Register</h3>
        <p class="text-gray-500 text-sm mb-8">Fill in the details to create your account</p>

        <form id="registrationForm" onsubmit="handleRegistration(event)" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Full Name</label>
                <input type="text" id="full-name" placeholder="John Doe" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <input type="email" id="reg-email" placeholder="your.email@example.com" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Role</label>
                <div class="relative">
                    <select id="role-select" onchange="toggleOrganization()" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-200 appearance-none focus:ring-2 focus:ring-blue-500 outline-none bg-white transition cursor-pointer font-medium">
                        <option value="none" selected disabled>Select your role</option>
                        <option value="proponent">Project Proponent</option>
                        <option value="scrutiny">Scrutiny Team</option>
                        <option value="mom">MoM Team</option>
                        <option value="admin">Administrator</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none text-xs"></i>
                </div>
            </div>

            <div id="org-field" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Organization</label>
                <input type="text" id="org-name" placeholder="Your organization name"
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                <input type="password" id="reg-password" placeholder="Enter password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="Confirm your password" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg flex items-center justify-center gap-2 transition transform active:scale-[0.98] mt-4 shadow-lg shadow-blue-100">
                <i class="fa-solid fa-user-plus text-sm"></i> Create Account
            </button>
        </form>

        <div class="mt-8 text-center space-y-4">
             <p class="text-sm text-gray-600">Already have an account? <a href="signin.html" class="text-blue-600 font-bold hover:underline">Sign in here</a></p>
            <a href="index.html"
                class="text-gray-400 text-sm hover:text-gray-600 flex items-center gap-2 mx-auto justify-center transition">
                <i class="fa-solid fa-arrow-left text-xs"></i> Back to Home
            </a>
        </div>
    </div>

    <script>
        function toggleOrganization() {
            const roleSelect = document.getElementById('role-select');
            const orgField = document.getElementById('org-field');
            if (roleSelect.value === 'proponent') {
                orgField.classList.remove('hidden');
            } else {
                orgField.classList.add('hidden');
            }
        }

        function handleRegistration(event) {
            event.preventDefault(); 
            
            const fullName = document.getElementById('full-name').value;
            const email = document.getElementById('reg-email').value;
            const roleValue = document.getElementById('role-select').value;
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (roleValue === 'none') {
                alert('Please select a role.');
                return;
            }

            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            // Get existing users from localStorage or initialize empty array
            let users = JSON.parse(localStorage.getItem('pariveshUsers')) || [];

            // Check if user already exists
            if (users.find(u => u.email === email)) {
                alert('User with this email already exists!');
                return;
            }

            // Add new user to the list
            users.push({
                name: fullName,
                email: email,
                role: roleValue,
                password: password
            });

            // Save updated list back to localStorage
            localStorage.setItem('pariveshUsers', JSON.stringify(users));

            // Set current session data
            localStorage.setItem('userFullName', fullName);

            // Redirection logic
            const dashboards = {
                'proponent': 'proponent-dashboard.html',
                'mom': 'mom-dashboard.html',
                'scrutiny': 'scrutiny-dashboard.html',
                'admin': 'admin-dashboard.html'
            };

            window.location.href = dashboards[roleValue];
        }
    </script>
</body>
</html>
