<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Application | PARIVESH 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white px-8 py-4 flex justify-between items-center border-b border-gray-100 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white font-bold px-3 py-2 rounded-lg text-xl shadow-md shadow-blue-100">P3</div>
            <div>
                <h1 class="font-bold text-gray-800 text-lg leading-none">PARIVESH 3.0</h1>
                <p class="text-xs text-gray-500 mt-1 uppercase tracking-tighter font-semibold">Proponent Portal</p>
            </div>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center gap-3 border-r border-gray-200 pr-6">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 border border-blue-200">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="text-left">
                    <p id="userDisplay" class="text-sm font-bold text-gray-800 leading-none">User</p>
                    <p class="text-[10px] text-gray-400 font-bold mt-1 uppercase">Project Proponent</p>
                </div>
            </div>
            <a href="index.html" class="flex items-center gap-2 text-gray-400 hover:text-red-500 transition-colors font-bold text-sm">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
        <div class="mb-10 flex items-center gap-5">
            <a href="proponent-dashboard.html" class="w-11 h-11 bg-white border border-gray-200 rounded-xl flex items-center justify-center text-gray-400 hover:text-blue-600 hover:border-blue-200 transition shadow-sm">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <div>
                <h2 class="text-3xl font-black text-gray-900 tracking-tight">Create New Application</h2>
                <p class="text-gray-500 font-medium">Step 1: Basic Project Identification</p>
            </div>
        </div>

        <div class="flex items-center gap-4 mb-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 text-white rounded-full flex items-center justify-center text-sm font-bold">1</div>
                <span class="text-sm font-bold text-blue-600">Details</span>
            </div>
            <div class="h-[2px] w-12 bg-gray-200"></div>
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-gray-200 text-gray-400 rounded-full flex items-center justify-center text-sm font-bold">2</div>
                <span class="text-sm font-bold text-gray-400">Documents & Payment</span>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-gray-100 p-8 md:p-12 shadow-xl shadow-gray-200/40">
            <form id="appForm" class="space-y-10" onsubmit="saveAndContinue(event)">
                
                <section class="space-y-8">
                    <div class="flex items-center gap-3 pb-4 border-b border-gray-50">
                        <i class="fa-solid fa-circle-info text-blue-600"></i>
                        <h4 class="text-lg font-extrabold text-gray-800 uppercase tracking-wider">Project Information</h4>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="md:col-span-2 space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Project Name *</label>
                            <input type="text" id="projName" placeholder="e.g. Expansion of Limestone Mine" required
                                class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition bg-gray-50/30">
                        </div>

                        <div class="md:col-span-2 space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Project Objective/Description *</label>
                            <textarea id="projDesc" placeholder="Briefly describe the scope of the project..." rows="4" required
                                class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition bg-gray-50/30 resize-none"></textarea>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Application Category *</label>
                            <select id="projCat" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 outline-none transition bg-white cursor-pointer">
                                <option value="" disabled selected>Select Category</option>
                                <option value="A">Category A (Central)</option>
                                <option value="B1">Category B1 (State)</option>
                                <option value="B2">Category B2 (State)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Industry Sector *</label>
                            <select id="projSector" required class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 outline-none transition bg-white cursor-pointer">
                                <option value="" disabled selected>Select Sector</option>
                                <option value="Mining">Mining of Minerals</option>
                                <option value="Infrastructure">Infrastructure Projects</option>
                                <option value="Industrial">Industrial Estates</option>
                                <option value="Thermal">Thermal Power Plants</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Estimated Investment (INR Crores) *</label>
                            <input type="number" id="projCost" placeholder="0.00" required
                                class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 outline-none transition bg-gray-50/30 font-bold text-blue-600">
                        </div>

                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-gray-700">Specific Location (State/UT) *</label>
                            <input type="text" id="projLoc" placeholder="e.g. Gujarat" required
                                class="w-full px-5 py-4 rounded-2xl border border-gray-200 focus:ring-4 focus:ring-blue-500/10 outline-none transition bg-gray-50/30">
                        </div>
                    </div>
                </section>

                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 pt-8 border-t border-gray-100">
                    <button type="button" onclick="window.location.href='proponent-dashboard.html'" class="w-full sm:w-auto px-10 py-4 text-gray-400 font-bold hover:text-gray-600 transition">
                        Discard Draft
                    </button>
                    <button type="submit" class="w-full sm:w-auto px-12 py-4 bg-blue-600 hover:bg-blue-700 text-white font-extrabold rounded-2xl transition transform active:scale-95 shadow-xl shadow-blue-100 flex items-center justify-center gap-3">
                        Save & Next Step <i class="fa-solid fa-chevron-right text-xs"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('userFullName');
            document.getElementById('userDisplay').innerText = name || 'User';
        };

        function saveAndContinue(event) {
            event.preventDefault();

            // 1. Generate real-time identifiers
            const randomID = Math.floor(1000 + Math.random() * 9000);
            const sectorValue = document.getElementById('projSector').value;
            const proposalNumber = `IA/CH/${sectorValue.substring(0,3).toUpperCase()}/${randomID}/2026`;

            // 2. Prepare unified data object (using keys expected by dashboard)
            const applicationData = {
                // Dashboard table keys
                id: proposalNumber,
                name: document.getElementById('projName').value,
                
                // Sidebar / Global Display keys
                projectName: document.getElementById('projName').value,
                proposalNo: proposalNumber,
                
                // Other details
                category: document.getElementById('projCat').value,
                sector: sectorValue,
                location: document.getElementById('projLoc').value,
                cost: document.getElementById('projCost').value,
                description: document.getElementById('projDesc').value,
                submissionDate: new Date().toLocaleDateString(),
                status: "Pending Scrutiny",
                documentId: "DOC-" + randomID
            };

            // 3. Save as the single active session
            localStorage.setItem('currentApplication', JSON.stringify(applicationData));

            // 4. Update the Scrutiny Queue (adds this to the list of all projects)
            let scrutinyQueue = JSON.parse(localStorage.getItem('scrutinyQueue')) || [];
            scrutinyQueue.push(applicationData);
            localStorage.setItem('scrutinyQueue', JSON.stringify(scrutinyQueue));

            // 5. Move to next step
            window.location.href = 'application-step-2.html';
        }
    </script>
</body>
</html>
