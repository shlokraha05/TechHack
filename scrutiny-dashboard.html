<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scrutiny Dashboard | PARIVESH 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 font-['Inter']">

    <header class="bg-white border-b border-gray-100 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white font-bold px-3 py-1 rounded-lg">P3</div>
            <h1 class="font-bold text-gray-800">Scrutiny Team Portal</h1>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-6">
        <div class="mb-8">
            <h2 class="text-2xl font-black text-gray-900">Application Scrutiny Queue</h2>
            <p class="text-gray-500">Verify data and schedule committee meetings.</p>
        </div>

        <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Project ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Project Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Status</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Action</th>
                    </tr>
                </thead>
                <tbody id="queue-body"></tbody>
            </table>
        </div>
    </main>

    <div id="verifyModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 shadow-2xl">
            <div id="modalStep1">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-900">Verify Application Data</h3>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-xl"></i></button>
                </div>
                <div id="modalContent" class="space-y-6"></div>
                <div class="flex gap-4 mt-10">
                    <button onclick="showScheduler()" class="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition">Approve & Schedule</button>
                    <button onclick="processAction('EDS Raised')" class="flex-1 bg-amber-500 text-white py-3 rounded-xl font-bold hover:bg-amber-600 transition">Raise EDS</button>
                </div>
            </div>

            <div id="schedulerSection" class="hidden">
                <h3 class="text-xl font-bold text-gray-900 mb-2">Schedule EAC Meeting</h3>
                <p class="text-sm text-gray-500 mb-6">Assign a date for the Expert Appraisal Committee review.</p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Meeting Date</label>
                        <input type="date" id="meetingDate" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Meeting Venue/Link</label>
                        <input type="text" id="meetingVenue" value="Conference Room A / Virtual" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div class="flex gap-4 mt-10">
                    <button onclick="hideScheduler()" class="flex-1 text-gray-500 font-bold">Back</button>
                    <button onclick="processAction('Referred')" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">Confirm & Forward</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedIndex = null;

        function loadQueue() {
            const queueBody = document.getElementById('queue-body');
            const queue = JSON.parse(localStorage.getItem('scrutinyQueue')) || [];
            queueBody.innerHTML = "";

            queue.forEach((app, index) => {
                // We show all items, but color the status
                const statusColor = app.status === 'EDS Raised' ? 'text-amber-600 bg-amber-50' : 'text-blue-600 bg-blue-50';
                
                const row = `
                    <tr class="border-b border-gray-50 hover:bg-gray-50/50 transition">
                        <td class="px-6 py-4 font-mono text-sm text-blue-600 font-bold">${app.id}</td>
                        <td class="px-6 py-4 font-bold text-gray-800">${app.name}</td>
                        <td class="px-6 py-4">
                            <span class="${statusColor} text-[10px] font-black px-2 py-1 rounded-md uppercase tracking-tighter">
                                ${app.status}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="openVerifyModal(${index})" class="bg-gray-900 text-white px-4 py-2 rounded-lg font-bold text-xs hover:bg-black transition">
                                Verify & Action
                            </button>
                        </td>
                    </tr>
                `;
                queueBody.innerHTML += row;
            });
        }

        function openVerifyModal(index) {
            selectedIndex = index;
            const queue = JSON.parse(localStorage.getItem('scrutinyQueue')) || [];
            const app = queue[index];
            document.getElementById('modalContent').innerHTML = `
                <div class="p-4 bg-gray-50 rounded-xl border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Project</p>
                    <p class="font-bold text-gray-800">${app.name} (${app.category})</p>
                    <p class="text-xs text-gray-500 mt-1">Investment: ₹ ${app.cost} Cr | Sector: ${app.sector}</p>
                </div>
                <div class="p-4 bg-blue-50 rounded-xl border border-blue-100 flex justify-between items-center">
                    <span class="text-xs font-bold text-blue-700">Document ID: ${app.documentId}</span>
                    <button class="text-blue-600 text-xs font-bold underline">Preview PDF</button>
                </div>
            `;
            document.getElementById('verifyModal').classList.remove('hidden');
        }

        function showScheduler() {
            document.getElementById('modalStep1').classList.add('hidden');
            document.getElementById('schedulerSection').classList.remove('hidden');
        }

        function hideScheduler() {
            document.getElementById('modalStep1').classList.remove('hidden');
            document.getElementById('schedulerSection').classList.add('hidden');
        }

        function closeModal() {
            document.getElementById('verifyModal').classList.add('hidden');
            hideScheduler();
        }

        function processAction(newStatus) {
            let queue = JSON.parse(localStorage.getItem('scrutinyQueue')) || [];
            
            // Apply logic
            queue[selectedIndex].status = newStatus;
            
            if(newStatus === 'Referred') {
                queue[selectedIndex].meetingDate = document.getElementById('meetingDate').value || "TBD";
                queue[selectedIndex].meetingVenue = document.getElementById('meetingVenue').value;
            }

            localStorage.setItem('scrutinyQueue', JSON.stringify(queue));
            alert(`Application updated to: ${newStatus}`);
            closeModal();
            loadQueue();
        }

        window.onload = loadQueue;
    </script>
</body>
</html>
