<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proponent Dashboard | PARIVESH 3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .status-badge { @apply px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-tighter; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white px-8 py-4 flex justify-between items-center border-b border-gray-100 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 text-white font-bold px-3 py-2 rounded-lg text-xl shadow-md shadow-blue-100">P3</div>
            <div>
                <h1 class="font-bold text-gray-800 text-lg leading-none">PARIVESH 3.0</h1>
                <p class="text-[10px] text-blue-600 font-bold mt-1 uppercase tracking-widest">Proponent Portal</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <span id="userName" class="text-sm font-bold text-gray-700 bg-gray-100 px-4 py-2 rounded-xl">Loading...</span>
            <a href="index.html" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-12">
        <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 mb-12">
            <div>
                <h2 class="text-3xl font-black text-gray-900 tracking-tight">Project Portfolio</h2>
                <p class="text-gray-500 font-medium">Track your Environmental Clearance applications.</p>
            </div>
            <button onclick="window.location.href='application-form.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold shadow-xl shadow-blue-100 transition flex items-center gap-3 w-fit">
                <i class="fa-solid fa-plus text-sm"></i> Create New Application
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] border border-gray-100 shadow-sm overflow-hidden">
            <div class="p-8 border-b border-gray-50 flex justify-between items-center">
                <h4 class="font-bold text-gray-800">My Applications</h4>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50/50">
                        <tr>
                            <th class="px-8 py-4 text-[10px] font-black text-gray-400 uppercase">Application ID</th>
                            <th class="px-8 py-4 text-[10px] font-black text-gray-400 uppercase">Project Name</th>
                            <th class="px-8 py-4 text-[10px] font-black text-gray-400 uppercase">Status</th>
                            <th class="px-8 py-4 text-[10px] font-black text-gray-400 uppercase">Last Updated</th>
                        </tr>
                    </thead>
                    <tbody id="appTableBody" class="divide-y divide-gray-50"></tbody>
                </table>
            </div>
            <div id="noData" class="hidden py-20 text-center">
                <p class="text-gray-400 font-bold">No active applications found.</p>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            document.getElementById('userName').innerText = localStorage.getItem('userFullName') || "Proponent User";
            renderDashboard();
        };

        function renderDashboard() {
            const queue = JSON.parse(localStorage.getItem('scrutinyQueue')) || [];
            const tableBody = document.getElementById('appTableBody');
            const noData = document.getElementById('noData');
            
            tableBody.innerHTML = "";

            if (queue.length === 0) {
                noData.classList.remove('hidden');
            } else {
                noData.classList.add('hidden');
                queue.forEach((app) => {
                    const statusMap = {
                        "Submitted": "bg-blue-50 text-blue-600",
                        "EDS Raised": "bg-red-50 text-red-600",
                        "Forwarded": "bg-purple-50 text-purple-600"
                    };

                    tableBody.innerHTML += `
                        <tr class="hover:bg-gray-50/50 transition">
                            <td class="px-8 py-6 font-mono text-xs font-bold text-blue-600">${app.id}</td>
                            <td class="px-8 py-6">
                                <p class="font-bold text-gray-800">${app.name}</p>
                                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">${app.sector}</p>
                            </td>
                            <td class="px-8 py-6">
                                <span class="status-badge ${statusMap[app.status] || 'bg-gray-100 text-gray-500'}">${app.status}</span>
                            </td>
                            <td class="px-8 py-6 text-xs text-gray-500 font-medium">
                                ${new Date().toLocaleDateString()}
                            </td>
                        </tr>`;
                });
            }
        }
    </script>
</body>
</html>
